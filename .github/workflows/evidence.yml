name: Reproduce dependency advisory graph

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  reproduce:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      RUNX_RECEIPT_SIGN_KID: runx-public-demo-key
      RUNX_RECEIPT_SIGN_ED25519_SEED_BASE64: QkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkI=
      RUNX_RECEIPT_SIGN_ISSUER_TYPE: hosted
      RUNX_RECEIPT_VERIFY_KID: runx-public-demo-key
      RUNX_RECEIPT_VERIFY_ED25519_PUBLIC_KEY_BASE64: IVL40Zt5HSRFMkLhXy6rbLfP+ntqXtMAl5YOBpiB2xI=
      RUNX_RECEIPT_DIR: ${{ github.workspace }}/receipts

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run unit tests
        run: npm test

      - name: Run vulnerable and clean harness cases
        run: |
          npx --yes @runxhq/cli@0.6.6 harness "$GITHUB_WORKSPACE" \
            --receipt-dir "$GITHUB_WORKSPACE/harness-receipts" \
            --json | tee harness-output.json

      - name: Execute governed audit
        run: |
          set -o pipefail
          npx --yes @runxhq/cli@0.6.6 skill "$GITHUB_WORKSPACE" \
            --runner audit \
            --input "target_name=OWASP NodeGoat" \
            --input "target_repo=https://github.com/OWASP/NodeGoat" \
            --input "target_commit=c5cb68a7084e4ae7dcc60e6a98768720a81841e8" \
            --input "lockfile_url=https://raw.githubusercontent.com/OWASP/NodeGoat/c5cb68a7084e4ae7dcc60e6a98768720a81841e8/package-lock.json" \
            --input "dependency_scope=direct-production" \
            --receipt-dir "$RUNX_RECEIPT_DIR" \
            --json | tee runx-output.json

      - name: Verify sealed receipts
        run: |
          count=0
          while IFS= read -r receipt; do
            npx --yes @runxhq/cli@0.6.6 verify \
              --receipt "$receipt" \
              --json
            count=$((count + 1))
          done < <(find receipts -maxdepth 1 -type f -name 'sha256:*.json' -print)
          test "$count" -ge 1

      - name: Summarize evidence
        run: |
          node -e 'const d=require("./artifacts/delivery.json"); console.log(JSON.stringify({target:d.target, result:d.result, verification:d.verification, delivery_digest:d.delivery_digest}, null, 2))' \
            | tee evidence-summary.json

      - name: Prepare portable receipt filenames
        run: |
          mkdir -p portable-receipts
          : > portable-receipts/index.txt
          for receipt in receipts/sha256:*.json; do
            portable="portable-receipts/$(basename "$receipt" | tr ':' '_')"
            cp "$receipt" "$portable"
            printf '%s -> %s\n' "$receipt" "$portable" >> portable-receipts/index.txt
          done

      - uses: actions/upload-artifact@v4
        with:
          name: dependency-advisory-graph-evidence
          if-no-files-found: error
          retention-days: 90
          path: |
            artifacts/
            portable-receipts/
            runx-output.json
            harness-output.json
            evidence-summary.json
